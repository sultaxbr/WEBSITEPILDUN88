<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAROT88 – Premium Casino</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #ff2222;
    --gold-light: #ff6666;
    --gold-dark: #cc0000;
    --blue-bright: #ff0000;
    --blue-glow: #ff3333;
    --blue-dark: #990000;
    --black: #0a0000;
    --dark: #140000;
    --dark2: #1a0000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── STAR FIELD ── */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: var(--blue-glow);
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0; transform: scale(0.8); }
    100% { opacity: var(--op); transform: scale(1.3); }
  }

  /* ── RADIAL GLOW BG ── */
  .bg-glow {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,0,0,0.25) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 20% 80%, rgba(255,30,30,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 60%, rgba(255,30,30,0.1) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── LAYOUT ── */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px 60px;
  }

  /* ── LOGO TOP ── */
  .logo-top {
    text-align: center;
    margin-bottom: 10px;
    animation: fadeDown 0.9s ease both;
  }
  .logo-top h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    font-weight: 900;
    background: linear-gradient(180deg, #ffffff 0%, #d0d0d0 25%, #a8a8a8 50%, #e8e8e8 75%, #ffffff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.06em;
    text-shadow: none;
    filter: drop-shadow(0 0 18px rgba(220,220,220,0.8));
  }
  .logo-ornament {
    display: block;
    margin: 6px auto 0;
    width: 140px;
    opacity: 0.75;
  }

  /* ── HERO CARD ── */
  .hero-card {
    position: relative;
    width: min(480px, 90vw);
    border-radius: 18px;
    overflow: hidden;
    margin: 10px 0 36px;
    animation: fadeUp 1s 0.3s ease both;
    box-shadow:
      0 0 0 1.5px rgba(255,30,30,0.4),
      0 0 40px rgba(255,30,30,0.22),
      0 0 80px rgba(255,30,30,0.15),
      0 30px 60px rgba(0,0,0,0.7);
  }
  .hero-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(255,30,30,0.2) 0%, transparent 50%, rgba(255,30,30,0.15) 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* inner glow border */
  .hero-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    border: 1.5px solid transparent;
    background: linear-gradient(135deg, rgba(255,30,30,0.65), rgba(255,30,30,0.35), rgba(255,30,30,0.65)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    z-index: 3;
    pointer-events: none;
  }

  .hero-inner {
    position: relative;
    background: linear-gradient(160deg, #1a0000 0%, #110000 60%, #160000 100%);
    padding: 24px 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .hero-logo-overlay {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.8rem, 5.5vw, 3rem);
    font-weight: 900;
    background: linear-gradient(180deg, #ffffff 0%, #d0d0d0 30%, #a8a8a8 60%, #e8e8e8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(220,220,220,0.9));
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    text-align: center;
  }

  .casino-svg-wrap {
    width: 100%;
    height: 100%;
    position: relative;
  }

  /* Floating chips */
  .chip {
    position: absolute;
    border-radius: 50%;
    border: 3px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.55rem;
    color: #fff;
    animation: float var(--fd) ease-in-out infinite alternate;
    box-shadow: 0 0 10px var(--cc);
  }
  @keyframes float {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-12px) rotate(15deg); }
  }

  .scene-content {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 320px;
  }

  /* Main character placeholder – stylised SVG */
  .char-glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 70% at 52% 55%, rgba(0,0,0,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── BUTTONS ── */
  .btn-group {
    width: min(480px, 90vw);
    display: flex;
    flex-direction: column;
    gap: 14px;
    animation: fadeUp 1s 0.6s ease both;
  }

  .btn {
    display: block;
    width: 100%;
    padding: 18px 24px;
    border: none;
    border-radius: 10px;
    font-family: 'Cinzel', serif;
    font-size: clamp(0.85rem, 3vw, 1rem);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .btn:hover::before { transform: translateX(100%); }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }

  .btn-login {
    background: linear-gradient(135deg, #990000 0%, #ff1a1a 50%, #990000 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,26,26,0.55), 0 0 0 1px rgba(255,80,80,0.4);
  }
  .btn-login:hover {
    box-shadow: 0 8px 30px rgba(255,26,26,0.75), 0 0 0 1px rgba(255,80,80,0.6);
  }

  .btn-register {
    background: linear-gradient(135deg, #990000 0%, #ff1a1a 50%, #990000 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,26,26,0.55), 0 0 0 1px rgba(255,80,80,0.4);
  }
  .btn-register:hover {
    box-shadow: 0 8px 30px rgba(255,26,26,0.75), 0 0 0 1px rgba(255,80,80,0.6);
  }

  .btn-rtp {
    background: linear-gradient(135deg, #990000 0%, #ff1a1a 50%, #990000 100%);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,26,26,0.55), 0 0 0 1px rgba(255,80,80,0.4);
    letter-spacing: 0.22em;
  }
  .btn-rtp:hover {
    box-shadow: 0 8px 30px rgba(255,26,26,0.75), 0 0 0 1px rgba(255,80,80,0.6);
  }

  /* ── BOTTOM TAGLINE ── */
  .tagline {
    margin-top: 28px;
    text-align: center;
    color: rgba(255,30,30,0.55);
    font-family: 'Raleway', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: fadeUp 1s 0.9s ease both;
  }

  /* ── KEYFRAMES ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── ROULETTE SPIN ── */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* ── SPARKLE ── */
  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    background: var(--gold-light);
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    animation: sparkle-anim var(--sd) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes sparkle-anim {
    0%,100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    50% { opacity: 0.9; transform: scale(1.4) rotate(180deg); }
  }

  /* CHIPS FLOATING OUTSIDE CARD */
  .outer-chip {
    position: fixed;
    border-radius: 50%;
    border: 3px solid;
    width: 28px; height: 28px;
    animation: orbit var(--od) linear infinite;
    opacity: 0.35;
    z-index: 0;
  }
  @keyframes orbit {
    from { transform: translateY(0) rotate(0deg); }
    to   { transform: translateY(-20px) rotate(360deg); }
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="bg-glow"></div>
<div class="stars" id="stars"></div>

<!-- Main content -->
<div class="container">

  <!-- TOP LOGO -->
  <div class="logo-top">
    <h1>JAROT88</h1>
    <!-- SVG ornament -->
    <svg class="logo-ornament" viewBox="0 0 140 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="10" x2="45" y2="10" stroke="#ff2222" stroke-width="1" stroke-dasharray="3 3"/>
      <path d="M55 10 L60 4 L65 10 L70 4 L75 10 L80 4 L85 10" stroke="#ff2222" stroke-width="1.2" fill="none"/>
      <circle cx="70" cy="10" r="4" fill="none" stroke="#ff2222" stroke-width="1.2"/>
      <line x1="95" y1="10" x2="140" y2="10" stroke="#ff2222" stroke-width="1" stroke-dasharray="3 3"/>
    </svg>
  </div>

  <!-- HERO CARD -->
  <div class="hero-card">
    <div class="hero-inner">
      <div class="hero-logo-overlay">JAROT88</div>

      <!-- Casino Scene (SVG-based, no external images) -->
      <div class="casino-scene">
        <div class="char-glow"></div>
        <svg viewBox="0 0 400 400" style="display:none;" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:absolute;top:0;left:0;">
          <defs>
            <radialGradient id="bg" cx="50%" cy="50%" r="60%">
              <stop offset="0%" stop-color="#1e0840"/>
              <stop offset="100%" stop-color="#04020d"/>
            </radialGradient>
            <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <radialGradient id="glow2" cx="50%" cy="60%" r="40%">
              <stop offset="0%" stop-color="#ff2222" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="transparent"/>
            </radialGradient>
            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#ff9999"/>
              <stop offset="50%" stop-color="#ff2222"/>
              <stop offset="100%" stop-color="#cc0000"/>
            </linearGradient>
            <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#60a5fa"/>
              <stop offset="100%" stop-color="#1d4ed8"/>
            </linearGradient>
            <filter id="blur1">
              <feGaussianBlur stdDeviation="8"/>
            </filter>
            <filter id="glow-filter">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- BG -->
          <rect width="400" height="400" fill="url(#bg)"/>
          <ellipse cx="200" cy="200" rx="180" ry="180" fill="url(#glow1)" filter="url(#blur1)"/>
          <ellipse cx="200" cy="260" rx="130" ry="110" fill="url(#glow2)" filter="url(#blur1)"/>

          <!-- Roulette wheel -->
          <g transform="translate(60, 240) rotate(0)" style="animation: spin 8s linear infinite; transform-origin: 70px 70px;" id="roulette">
            <circle cx="70" cy="70" r="62" fill="#1a0a30" stroke="#ff2222" stroke-width="2.5"/>
            <circle cx="70" cy="70" r="55" fill="none" stroke="#cc0000" stroke-width="1"/>
            <circle cx="70" cy="70" r="40" fill="#0d0520" stroke="#ff2222" stroke-width="1.5"/>
            <circle cx="70" cy="70" r="15" fill="#ff2222" opacity="0.85"/>
            <circle cx="70" cy="70" r="8" fill="#ff6666"/>

<script>
  // Generate stars

  for (let i = 0; i < 55; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 5 + 2;
    s.style.cssText = `
      width: ${size}px; height: ${size}px;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --d: ${(Math.random() * 3 + 1.5).toFixed(1)}s;
      --op: ${(Math.random() * 0.6 + 0.2).toFixed(2)};
      animation-delay: ${(Math.random() * 4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  // Animate roulette via JS
  const roulette = document.getElementById('roulette');
  let angle = 0;
  function spinRoulette() {
    angle += 0.4;
    roulette.setAttribute('transform', `translate(60, 240) rotate(${angle}, 70, 70)`);
    requestAnimationFrame(spinRoulette);
  }
  spinRoulette();

  // Button ripple effect
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `
        position: absolute;
        width: ${size}px; height: ${size}px;
        left: ${e.clientX - rect.left - size/2}px;
        top: ${e.clientY - rect.top - size/2}px;
        background: rgba(255,255,255,0.25);
        border-radius: 50%;
        transform: scale(0);
        animation: ripple-anim 0.5s ease-out forwards;
        pointer-events: none;
      `;
      this.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);
    });
  });

  // Inject ripple keyframe
  const style = document.createElement('style');
  style.textContent = `@keyframes ripple-anim { to { transform: scale(2.5); opacity: 0; } }`;
  document.head.appendChild(style);
</script>
